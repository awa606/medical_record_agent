name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest httpx

      - name: Run Python tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q

      - name: Check diff whitespace
        run: git diff --check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check doctor frontend JavaScript
        run: node --check static/doctor.js

      - name: Check service health endpoint
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          APP_PID=$!
          python - <<'PY'
          import json
          import time
          import urllib.request

          last_error = None
          for _ in range(30):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=2) as response:
                      payload = json.loads(response.read().decode("utf-8"))
                  if payload.get("status") == "ok":
                      raise SystemExit(0)
                  last_error = f"unexpected payload: {payload!r}"
              except Exception as exc:  # noqa: BLE001
                  last_error = str(exc)
                  time.sleep(1)
          raise SystemExit(f"/health did not become ready: {last_error}")
          PY
          kill "$APP_PID"
