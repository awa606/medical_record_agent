services:
  medical-record-agent:
    image: medical-record-agent:department-pilot
    container_name: medical-record-agent-pilot
    ports:
      - "${MRA_HOST_PORT:-2626}:8000"
    environment:
      RECORD_PROVIDER_MODE: ${RECORD_PROVIDER_MODE:-edge}
      MEDICAL_RECORD_AGENT_DB: ${MEDICAL_RECORD_AGENT_DB:-/app/runtime/medical_record_agent.sqlite3}
      MEDICAL_RECORD_AGENT_UPLOAD_DIR: ${MEDICAL_RECORD_AGENT_UPLOAD_DIR:-/app/runtime/uploads}
      MEDICAL_RECORD_AGENT_OUTPUT_DIR: ${MEDICAL_RECORD_AGENT_OUTPUT_DIR:-/app/runtime/outputs}
      MEDICAL_RECORD_AGENT_SPEAKER_PROFILE_DIR: ${MEDICAL_RECORD_AGENT_SPEAKER_PROFILE_DIR:-/app/runtime/speaker_profiles}
      MEDICAL_RECORD_AGENT_MIN_FREE_BYTES: ${MEDICAL_RECORD_AGENT_MIN_FREE_BYTES:-1073741824}
      MEDICAL_RECORD_AGENT_MAX_UPLOAD_BYTES: ${MEDICAL_RECORD_AGENT_MAX_UPLOAD_BYTES:-209715200}
      MEDICAL_RECORD_AGENT_MAX_RECORDING_CHUNK_BYTES: ${MEDICAL_RECORD_AGENT_MAX_RECORDING_CHUNK_BYTES:-16777216}
      MEDICAL_RECORD_AGENT_MAX_RECORDING_SECONDS: ${MEDICAL_RECORD_AGENT_MAX_RECORDING_SECONDS:-1800}
      MEDICAL_RECORD_AGENT_AUTH_BOOTSTRAP: ${MEDICAL_RECORD_AGENT_AUTH_BOOTSTRAP:-1}
      MEDICAL_RECORD_AGENT_BOOTSTRAP_ADMIN_USERNAME: ${MEDICAL_RECORD_AGENT_BOOTSTRAP_ADMIN_USERNAME:-pilot_admin}
      MEDICAL_RECORD_AGENT_BOOTSTRAP_ADMIN_PASSWORD: ${MEDICAL_RECORD_AGENT_BOOTSTRAP_ADMIN_PASSWORD:-}
      MEDICAL_RECORD_AGENT_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${MEDICAL_RECORD_AGENT_BOOTSTRAP_ADMIN_DISPLAY_NAME:-Department Pilot Admin}
      MEDICAL_RECORD_AGENT_SESSION_HOURS: ${MEDICAL_RECORD_AGENT_SESSION_HOURS:-8}
      MEDICAL_RECORD_AGENT_COOKIE_SECURE: ${MEDICAL_RECORD_AGENT_COOKIE_SECURE:-0}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      ONLINE_LLM_API_BASE: ${ONLINE_LLM_API_BASE:-}
      ONLINE_LLM_API_KEY: ${ONLINE_LLM_API_KEY:-}
      ONLINE_LLM_MODEL: ${ONLINE_LLM_MODEL:-}
      ONLINE_ASR_API_URL: ${ONLINE_ASR_API_URL:-}
      ONLINE_ASR_API_KEY: ${ONLINE_ASR_API_KEY:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      ASR_SESSION_CHUNK_ENABLED: ${ASR_SESSION_CHUNK_ENABLED:-1}
      ASR_SESSION_DYNAMIC_CHUNKING: ${ASR_SESSION_DYNAMIC_CHUNKING:-1}
      ASR_SESSION_REALTIME_UPLOAD_ENABLED: ${ASR_SESSION_REALTIME_UPLOAD_ENABLED:-1}
      MODELSCOPE_CACHE: ${MODELSCOPE_CACHE:-/app/model_cache/modelscope}
      HF_HOME: ${HF_HOME:-/app/model_cache/hf}
      TORCH_HOME: ${TORCH_HOME:-/app/model_cache/torch}
      FUNASR_STREAMING_MODEL_ID: ${FUNASR_STREAMING_MODEL_ID:-ParaformerStreaming}
      FUNASR_STREAMING_SEGMENT_SECONDS: ${FUNASR_STREAMING_SEGMENT_SECONDS:-6}
      FUNASR_DEVICE: ${FUNASR_DEVICE:-cpu}
      FUNASR_DISABLE_UPDATE: ${FUNASR_DISABLE_UPDATE:-1}
      ASR_PREWARM_ENABLED: ${ASR_PREWARM_ENABLED:-1}
      MEDICAL_RECORD_AGENT_REQUIRE_FUNASR: ${MEDICAL_RECORD_AGENT_REQUIRE_FUNASR:-1}
      MEDICAL_RECORD_AGENT_FUNASR_CACHE_MIN_FILES: ${MEDICAL_RECORD_AGENT_FUNASR_CACHE_MIN_FILES:-5}
    volumes:
      - ./data/pilot_runtime:/app/runtime
      - ./data/asr_model_cache:/app/model_cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
