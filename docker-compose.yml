services:
  medical-record-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: medical-record-agent:local-asr
    container_name: medical-record-agent
    ports:
      - "2601:8000"
    environment:
      PYTHONPATH: /app
      MEDICAL_RECORD_AGENT_DB: /app/runtime/medical_record_agent.sqlite3
      MEDICAL_RECORD_AGENT_UPLOAD_DIR: /app/runtime/uploads
      MEDICAL_RECORD_AGENT_OUTPUT_DIR: /app/runtime/outputs
      MEDICAL_RECORD_AGENT_SPEAKER_PROFILE_DIR: /app/runtime/speaker_profiles
      ASR_SESSION_CHUNK_ENABLED: "1"
      ASR_SESSION_DYNAMIC_CHUNKING: "1"
      ASR_SESSION_REALTIME_UPLOAD_ENABLED: "1"
      FUNASR_STREAMING_MODEL_ID: paraformer-zh-streaming
      FUNASR_STREAMING_SEGMENT_SECONDS: "6"
      FUNASR_DEVICE: cpu
      ASR_PREWARM_ENABLED: "1"
      ASR_SESSION_REALTIME_CHUNK_SECONDS: "3"
      ASR_SESSION_REALTIME_CHUNK_MIN_SECONDS: "0"
      ASR_SESSION_REALTIME_MAX_SECONDS: "7200"
      ASR_SESSION_REALTIME_MOCK_DELAY_SECONDS: "2.2"
      ASR_SESSION_SHORT_CHUNK_SECONDS: "60"
      ASR_SESSION_CHUNK_SECONDS: "300"
      ASR_SESSION_CHUNK_MIN_SECONDS: "60"
      SENSEVOICE_DEVICE: cpu
      SENSEVOICE_LANGUAGE: zh
      SENSEVOICE_HUB: hf
      CAMPP_SPEAKER_DEVICE: cpu
      SPEAKER_ROLE_PROVIDER: rules
      SPEAKER_ROLE_OLLAMA_BASE_URL: http://host.docker.internal:11434
      SPEAKER_ROLE_OLLAMA_MODEL: qwen3:4b-instruct
      HF_HOME: /app/model_cache/hf
      MODELSCOPE_CACHE: /app/model_cache/modelscope
      TORCH_HOME: /app/model_cache/torch
      XDG_CACHE_HOME: /app/model_cache/xdg
    volumes:
      - ./data/docker_runtime:/app/runtime
      - ./data/asr_model_cache:/app/model_cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
